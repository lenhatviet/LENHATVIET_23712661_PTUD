<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Student Manager</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    margin:40px;
}

h1{
    text-align:center;
}

.container{
    width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input{
    padding:6px;
    margin:5px;
}

button{
    padding:6px 10px;
    margin:5px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#eee;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Manager</h1>

<h3>Thêm sinh viên</h3>

<input id="id" placeholder="ID">
<input id="name" placeholder="Name">
<input id="year" placeholder="Birth">
<input id="major" placeholder="Major">
<input id="gpa" placeholder="GPA">

<button onclick="add()">Add</button>
<button onclick="load()">Load</button>

<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Birth</th>
<th>Major</th>
<th>GPA</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>


<script>

const API = "http://127.0.0.1:8000"


async function load(){

const r = await fetch(API + "/students")

const data = await r.json()

let s = ""

data.forEach(x=>{

s += `
<tr>

<td>${x[0]}</td>
<td>${x[1]}</td>
<td>${x[2]}</td>
<td>${x[3]}</td>
<td>${x[4]}</td>

<td>
<button onclick="del('${x[0]}')">
Delete
</button>
</td>

</tr>
`

})

document.getElementById("table").innerHTML = s

}



async function add(){

const sid = id.value
const name1 = name.value
const year1 = year.value
const major1 = major.value
const gpa1 = gpa.value


await fetch(API + "/add2",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

student_id:sid,
name:name1,
birth_year:year1,
major:major1,
gpa:gpa1

})

})

load()

}



async function del(id){

await fetch(API + "/delete2/" + id,{

method:"DELETE"

})

load()

}

</script>

</body>

</html>
